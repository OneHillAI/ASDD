# ASDD - advisory PR review (ANALYSIS half).
#
# SECURITY-CRITICAL. This workflow ingests UNTRUSTED pull-request content. Its only job is to analyse and
# emit a review artifact. It runs with a READ-ONLY token, holds NO write scope, and posts NOTHING. The
# advisory comment is posted by the separate pr-review-publish.yml, which never reads untrusted input.
#
# It is triggered by the intake workflow COMPLETING (workflow_run), not by the pull_request event, for two
# reasons:
#   1. Fork coverage. A fork PR on `pull_request` gets no secrets, so the model lenses silently dry-ran
#      and forks never got a real review. workflow_run runs in the BASE repo context, so the runtime key
#      is available for a fork PR too - the review is identical whoever opened it.
#   2. Spend gate. The model call is the only thing here that costs money. This runs ONLY when intake
#      concluded success (`if:` below), so a PR that fails intake - no disclosure, no DCO, no spec -
#      never reaches a model. Failed intake spends nothing.
#
# It never re-reads the PR event: all PR data (title, body, author, the diff, the intake verdict) comes
# from the intake artifact, produced in intake's no-secrets read-only job. The head ref is fetched only
# as DATA for the SAST layer (git fetch + git show; fork code is never checked out or executed).
#
#   - Untrusted input is files handed to the runtime as DATA paths, never interpolated into a prompt or a
#     shell command; the runtime returns review.json and nothing here shell-execs model output.
#   - permissions: contents: read (fetch the head ref as data) + actions: read (download the artifact).
#     NO write scope. Write scope + the posting action live in pr-review-publish.yml, a separate context.

name: ASDD review

on:
  workflow_run:
    workflows: ["ASDD intake"]
    types: [completed]

permissions:
  contents: read
  # actions: read to download the intake job's artifact across runs (workflow_run + download-artifact
  # with run-id). Read-only; no write scope is added.
  actions: read

concurrency:
  group: asdd-review-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  review:
    # Spend gate: only run when intake concluded success (i.e. the gate passed). A failed or skipped
    # (draft) intake run does not reach a model. The artifact guard below is belt-and-braces for the
    # draft/skip edge, where a run can complete without producing the artifact.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the base repo (trusted config + scripts only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Keep the read-only token (contents: read, no write scope): it is needed to fetch the PR head
          # ref as data for the SAST layer. Untrusted content is still only ever read, never executed.
          persist-credentials: true

      - name: Download the intake artifact (untrusted PR data + the intake verdict, as data)
        id: fetch
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: asdd-intake
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .asdd-work

      - name: Spend guard - only proceed when intake produced a PASSING verdict
        id: guard
        run: |
          set -euo pipefail
          if [ ! -f .asdd-work/intake.json ]; then
            echo "no intake artifact (draft or skipped run); nothing to review."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          passed="$(jq -r '.passed' .asdd-work/intake.json 2>/dev/null || echo false)"
          if [ "$passed" != "true" ]; then
            echo "intake did not pass; skipping the review (no model spend)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Fetch the PR head ref as data (for the SAST layer only; never checked out or executed)
        if: steps.guard.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          . .asdd-work/meta.env   # pr_number, base_sha, head_sha
          # A git fetch downloads objects; `git show <ref>:<path>` (in security_scan.py) reads file
          # content. Neither executes fork code. The working tree stays the trusted base checkout.
          git fetch --no-tags --depth=200 origin "+refs/pull/${pr_number}/head:refs/asdd-pr-head"

      - name: Install SAST tooling (bandit) - best-effort, layer 2 of the security lens
        if: steps.guard.outputs.proceed == 'true'
        run: pipx install bandit || python3 -m pip install --quiet --break-system-packages bandit || echo "bandit unavailable; deterministic checks only"

      - name: Run review (runtime adapter - read-only, output is data)
        if: steps.guard.outputs.proceed == 'true'
        env:
          # The only secret this read-only job holds: the model API key. No GitHub write scope. Available
          # for a fork PR too, because this runs in the base-repo context (workflow_run), not the fork's.
          ASDD_RUNTIME_TOKEN: ${{ secrets.ASDD_RUNTIME_TOKEN }}
          ASDD_RUNTIME_TOKEN__REVIEWER: ${{ secrets.ASDD_RUNTIME_TOKEN__REVIEWER }}
          ASDD_MODEL_URL: ${{ vars.ASDD_MODEL_URL }}
          ASDD_MODEL_URL__REVIEWER: ${{ vars.ASDD_MODEL_URL__REVIEWER }}
          ASDD_MODEL: ${{ vars.ASDD_MODEL }}
        run: bash .github/asdd/run-review.sh .asdd-work review.json

      - name: Upload review artifact (consumed by the publish workflow)
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: asdd-review
          path: |
            review.json
            audit.jsonl
          if-no-files-found: error
          retention-days: 7

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.guard.outputs.proceed }}" = "true" ]; then
            echo "## ASDD review (advisory)" >> "$GITHUB_STEP_SUMMARY"
            echo "Analysis ran read-only against the intake artifact. The advisory comment is posted by the publish workflow. Nothing merges automatically." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ASDD review - skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "Intake did not pass (or the PR is a draft), so no review ran and no model was called." >> "$GITHUB_STEP_SUMMARY"
          fi
