# ASDD operate - documentation agent (post-merge doc sync). TEMPLATE.
#
# Installed into an adopter's .github/workflows/ by `cli/init.sh --goose`. It runs the documentation
# agent after a change lands on main and posts its proposed doc updates on the merged PR.
#
# It triggers on push to main, so the input is TRUSTED (a human already reviewed and merged): that is why
# a tool-using agent (Goose with a shell) is acceptable here, and a single workflow is fine. The reviewer,
# by contrast, runs on untrusted PR content and is deliberately execution-free and split into read-only
# analysis + a separate publish. Do NOT copy this single-workflow shape to an agent that runs on untrusted
# (pre-merge) input; the runner calls `operate-guard` to enforce that rule mechanically.
#
# It proposes; it never merges and never edits code. Advisory: it posts a comment for a human to apply.

name: ASDD docsync

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: asdd-docsync-${{ github.sha }}
  cancel-in-progress: false

jobs:
  docsync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main (need history for the change diff)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 50
          persist-credentials: false

      - name: Install Goose (best-effort; docsync dry-runs if absent)
        run: |
          curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh | CONFIGURE=false bash || echo "goose install failed; will dry-run"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Resolving a role's provider is not enough: the workflow has to PASS it. An operate
      # agent that runs in CI needs BOTH the shared pair and its own role's pair in the env,
      # or the per-role override is silently inert and every run quietly uses the shared
      # provider. Copy this shape for any other operate agent you run in CI, with that
      # role's suffix. Unset secrets/vars evaluate to empty, so the resolver simply falls
      # back to the shared pair and a single-provider deployment is unaffected.
      - name: Run the documentation agent (trusted post-merge input)
        env:
          ASDD_RUNTIME_TOKEN: ${{ secrets.ASDD_RUNTIME_TOKEN }}
          ASDD_MODEL_URL: ${{ vars.ASDD_MODEL_URL }}
          ASDD_MODEL: ${{ vars.ASDD_MODEL }}
          # This role's own provider, if it has one (cli/resolve-model.sh prefers these).
          ASDD_RUNTIME_TOKEN__DOCUMENTATION: ${{ secrets.ASDD_RUNTIME_TOKEN__DOCUMENTATION }}
          ASDD_MODEL_URL__DOCUMENTATION: ${{ vars.ASDD_MODEL_URL__DOCUMENTATION }}
        run: bash .github/asdd/operate/docsync.sh "${{ github.sha }}" docsync-report.md

      - name: Post the proposal on the merged PR (or the commit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          [ -s docsync-report.md ] || { echo "no report; nothing to post"; exit 0; }
          body="$(cat docsync-report.md)"
          footer=$'\n\n<sub>Proposed by the ASDD documentation agent (advisory). A human applies or discards it. Nothing merges automatically.</sub>'
          pr="$(gh api "repos/$REPO/commits/$SHA/pulls" -H "Accept: application/vnd.github.groot-preview+json" --jq '.[0].number' 2>/dev/null || true)"
          if [ -n "${pr:-}" ] && [ "$pr" != "null" ]; then
            printf '%s%s' "$body" "$footer" | gh pr comment "$pr" --repo "$REPO" --body-file -
            echo "posted on PR #$pr"
          else
            printf '%s%s' "$body" "$footer" | gh api "repos/$REPO/commits/$SHA/comments" -f body=@- >/dev/null
            echo "posted as a commit comment (no associated PR)"
          fi
